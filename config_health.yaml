# Minimal config with health check and zpages.
# Requires collector contrib or custom collector for health check extension.
extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  zpages:
    endpoint: "0.0.0.0:55679"

receivers:
  otlp:
    protocols:
      grpc:
      http:

exporters:
  debug:
    verbosity: normal

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug]
      processors: []
